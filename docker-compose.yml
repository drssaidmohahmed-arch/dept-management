version: '3.8'
services:
  db-init:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - app-db:/app/db
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/db/custom.db
    command: ["sh", "-c", "npx prisma migrate deploy || true"]
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - app-data:/app/data
      - app-db:/app/db
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/db/custom.db
    restart: unless-stopped
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"] 
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  app-data:
  app-db: